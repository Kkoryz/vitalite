<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Vitalite project photography in progress">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="55%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a04a" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#c9a04a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c9a04a" stop-opacity="0.0"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect x="0" y="498" width="1600" height="3" fill="url(#accent)"/>
  <g fill="#c9a04a" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="800" y="450" font-size="44" font-weight="700" letter-spacing="6">VITALITE</text>
    <text x="800" y="510" font-size="18" font-weight="500" letter-spacing="4" fill="#a07d36">CONSTRUCTION CORP</text>
  </g>
  <g fill="rgba(255,255,255,0.6)" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="800" y="600" font-size="20" font-weight="500" letter-spacing="3">PROJECT PHOTOGRAPHY IN PROGRESS</text>
  </g>
</svg>
