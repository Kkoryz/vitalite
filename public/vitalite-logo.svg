<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 320" role="img" aria-labelledby="title desc">
  <title id="title">Vitalite gold horizontal logo</title>
  <desc id="desc">Gold Vitalite house emblem and horizontal wordmark on a transparent background.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff2a8"/>
      <stop offset="0.32" stop-color="#f4c942"/>
      <stop offset="0.62" stop-color="#c99519"/>
      <stop offset="1" stop-color="#ffe47a"/>
    </linearGradient>
    <linearGradient id="gold-edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="0.45" stop-color="#d39b18" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#8c6308" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="gold-shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="6" stdDeviation="3" flood-color="#3a2500" flood-opacity="0.42"/>
    </filter>
    <style>
      .gold-fill { fill: url(#gold); stroke: url(#gold-edge); stroke-width: 3; }
      .gold-stroke { fill: none; stroke: url(#gold); stroke-width: 30; stroke-linecap: butt; stroke-linejoin: miter; }
      .wordmark {
        fill: url(#gold);
        stroke: #9b6a09;
        stroke-width: 2.5;
        paint-order: stroke fill;
        font-family: Montserrat, Avenir Next, Arial, Helvetica, sans-serif;
        font-weight: 700;
        letter-spacing: 18px;
      }
    </style>
  </defs>

  <g filter="url(#gold-shadow)">
    <path class="gold-stroke" d="M 277 188 A 118 118 0 1 1 273 116"/>
    <path class="gold-fill" d="M 61 164 L 61 132 L 119 105 L 106 67 L 139 67 L 150 94 L 190 76 L 231 94 L 241 67 L 274 67 L 261 105 L 321 133 L 321 166 L 190 107 Z"/>
    <path class="gold-fill" d="M 127 156 L 160 145 L 190 236 L 221 145 L 253 156 L 208 274 L 173 274 Z"/>
    <rect class="gold-fill" x="174" y="135" width="17" height="17" rx="1.5"/>
    <rect class="gold-fill" x="197" y="135" width="17" height="17" rx="1.5"/>
    <rect class="gold-fill" x="174" y="158" width="17" height="17" rx="1.5"/>
    <rect class="gold-fill" x="197" y="158" width="17" height="17" rx="1.5"/>
  </g>

  <text class="wordmark" x="430" y="209" font-size="151">VITALITÉ</text>
</svg>
