<html lang="en">

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Vitalite Construction Corp. is a GTA design-build contractor for custom homes, multiplex housing, additions, permits, project management, and ICI construction." />
    <style id="vitalite-critical-paint">
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: #1a1a1a;
        color: #fff;
      }
    </style>
    <script>
      (() => {
        const measurementId = '__VITALITE_GA_MEASUREMENT_ID__';
        if (!/^G-[A-Z0-9]+$/.test(measurementId)) return;

        const script = document.createElement('script');
        script.async = true;
        script.src = `https://www.googletagmanager.com/gtag/js?id=${encodeURIComponent(measurementId)}`;
        document.head.appendChild(script);

        window.dataLayer = window.dataLayer || [];
        window.gtag = function gtag() {
          window.dataLayer.push(arguments);
        };
        window.gtag('js', new Date());
        window.gtag('config', measurementId, { send_page_view: false });
      })();
    </script>
    <title>Vitalite Construction Corp. | GTA Design-Build Contractor</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
